                                        {
                                            $ref: "#/components/schemas/PaginatedMeta",
                                        }
        post:
            tags: [Payments]
            summary: Create payment record
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [appointmentId, patientId, amount, method]
                            properties:
                                appointmentId: { type: string }
                                patientId: { type: string }
                                amount: { type: number }
                                method:
                                    {
                                        $ref: "#/components/schemas/PaymentMethod",
                                    }
                                phoneNumber: { type: string }
                                transactionId: { type: string }
                                paymentProof: { type: string }
                                note: { type: string }
            responses:
                "201":
                    description: Create payment record
                    content:
                        application/json:
                            schema: { $ref: "#/components/schemas/Payment" }

    /payments/{id}:
        parameters: [{ $ref: "#/components/parameters/id" }]
        get:
            tags: [Payments]
            summary: Get payment by ID
            responses:
                "200":
                    description: Get payment by ID
                    content:
                        application/json:
                            schema: { $ref: "#/components/schemas/Payment" }
        patch:
            tags: [Payments]
            summary: Update payment status
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                status:
                                    {
                                        $ref: "#/components/schemas/PaymentStatus",
                                    }
                                transactionId: { type: string }
                                paymentProof: { type: string }
                                paidAt: { type: string, format: date-time }
                                note: { type: string }
            responses:
                "200":
                    description: Update payment status
                    content:
                        application/json:
                            schema: { $ref: "#/components/schemas/Payment" }

    /payments/{id}/refund:
        post:
            tags: [Payments]
            summary: Process refund (Admin)
            parameters: [{ $ref: "#/components/parameters/id" }]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                note: { type: string }
            responses:
                "200":
                    description: Refund processed
                    content:
                        application/json:
                            schema: { $ref: "#/components/schemas/Payment" }

    # ── AUDIT LOGS ────────────────────────────────────────────────
    /audit-logs:
        get:
            tags: [Audit Logs]
            summary: List audit logs (Admin only)
            parameters:
                - { $ref: "#/components/parameters/page" }
                - { $ref: "#/components/parameters/limit" }
                - name: userId
                  in: query
                  schema: { type: string }
                - name: action
                  in: query
                  schema:
                      {
                          type: string,
                          enum: [CREATE, UPDATE, DELETE, LOGIN, PRINT],
                      }
                - name: tableName
                  in: query
                  schema: { type: string }
                - name: from
                  in: query
                  schema: { type: string, format: date }
                - name: to
                  in: query
                  schema: { type: string, format: date }
            responses:
                "200":
                    description: List audit logs (Admin only)
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        {
                                            type: array,
                                            items:
                                                {
                                                    $ref: "#/components/schemas/AuditLog",
                                                },
                                        }
                                    meta:
                                        {
                                            $ref: "#/components/schemas/PaginatedMeta",
                                        }
                "403": { $ref: "#/components/responses/Forbidden" }

    /audit-logs/{id}:
        parameters: [{ $ref: "#/components/parameters/id" }]
        get:
            tags: [Audit Logs]
            summary: Get single audit log entry (Admin only)
            responses:
                "200":
                    description: Get single audit log entry (Admin only)
                    content:
                        application/json:
                            schema: { $ref: "#/components/schemas/AuditLog" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }
