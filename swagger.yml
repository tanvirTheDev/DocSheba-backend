                  required: true
                  schema: { type: string }
                - name: date
                  in: query
                  required: true
                  schema: { type: string, format: date }
            responses:
                "200":
                    description: Get current serial counter for a doctor on a date
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    doctorId: { type: string }
                                    date: { type: string }
                                    lastSerial: { type: integer }
                                    next: { type: integer }

