                            schema:
                                {
                                    $ref: "#/components/schemas/PaginatedResponse",
                                }
        post:
            tags: [Referral Agents]
            summary: Create a referral agent
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/CreateReferralAgentRequest",
                            }
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/ReferralAgentResponse",
                                }

    /referral-agents/{id}:
        get:
            tags: [Referral Agents]
            summary: Get referral agent by ID
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    content:
                        application/json:
