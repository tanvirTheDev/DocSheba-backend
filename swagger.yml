            summary: List appointments (filtered by role)
            parameters:
                - { $ref: "#/components/parameters/page" }
                - { $ref: "#/components/parameters/limit" }
                - name: status
                  in: query
                  schema: { $ref: "#/components/schemas/AppointmentStatus" }
                - name: date
                  in: query
                  schema: { type: string, format: date }
                - name: doctorId
                  in: query
                  schema: { type: string }
            responses:
                "200":
                    description: List appointments (filtered by role)
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        {
                                            type: array,
                                            items:
                                                {
                                                    $ref: "#/components/schemas/Appointment",
                                                },
                                        }
                                    meta:
                                        {
                                            $ref: "#/components/schemas/PaginatedMeta",
                                        }

        post:
            tags: [Appointments]
            summary: Book a new appointment (assigns serial number)
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                [patientId, doctorId, fee, appointmentDate]
                            properties:
                                patientId: { type: string }
                                doctorId: { type: string }
                                fee: { type: integer }
                                appointmentType:
                                    {
                                        $ref: "#/components/schemas/AppointmentType",
                                    }
                                paymentMethod:
                                    {
                                        $ref: "#/components/schemas/PaymentMethod",
                                    }
                                appointmentDate:
                                    { type: string, format: date-time }
                                location: { type: string }
                                chiefComplaint: { type: string }
                                notes: { type: string }
                                agentId:
                                    {
                                        type: string,
                                        description: "Referral agent ID if applicable",
                                    }
            responses:
                "201":
                    description: Appointment created with serial number
                    content:
                        application/json:
                            schema: { $ref: "#/components/schemas/Appointment" }
                "400": { $ref: "#/components/responses/ValidationError" }

