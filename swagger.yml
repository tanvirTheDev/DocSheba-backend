# @format

openapi: 3.0.3
info:
    title: Clinic Management & Prescription System API
    description: |
        Complete REST API for the Clinic Management & Prescription System.
        Covers authentication, appointments, prescriptions, templates,
        referral agents, payments, drug database, and audit logs.

        **Roles:** `PATIENT` · `DOCTOR` · `DOCTOR_ASSISTANT` · `ADMIN`

        **Auth:** All protected endpoints require `Authorization: Bearer <access_token>`
    version: 1.0.0
    contact:
        name: Development Team

servers:
    - url: http://localhost:5000/api
      description: Local development
    - url: https://api.yourclinic.com/api
      description: Production

tags:
    - name: Auth
    - name: Users
    - name: Patient Profile
    - name: Doctor Profile
    - name: Appointments
    - name: Prescriptions
    - name: Chief Complaints
    - name: History
    - name: Examinations
    - name: Diagnoses
    - name: Investigations
    - name: Rx Items
    - name: Advice
    - name: Report Entries
    - name: BMI
    - name: Drug History
    - name: Plans
    - name: Notes
    - name: Drug Database
    - name: Templates – Advice
    - name: Templates – Drug
    - name: Templates – Treatment
    - name: Templates – Prescription
    - name: Referral Agents
    - name: Referrals
    - name: Payments
    - name: Audit Logs

# ──────────────────────────────────────────────────────────────
# SECURITY
# ──────────────────────────────────────────────────────────────
components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT

    # ── REUSABLE SCHEMAS ─────────────────────────────────────────
    schemas:
        # ── Enums ──────────────────────────────────────────────────
        Role:
            type: string
            enum: [PATIENT, DOCTOR, DOCTOR_ASSISTANT, ADMIN]

        AccountStatus:
            type: string
            enum: [PENDING, ACTIVE, INACTIVE, SUSPENDED]

        Sex:
            type: string
            enum: [MALE, FEMALE, OTHER]

        AppointmentType:
            type: string
            enum: [CONSULTATION, FOLLOW_UP, PRENATAL, POSTPARTUM]

        AppointmentStatus:
            type: string
            enum: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED]

        PaymentMethod:
            type: string
            enum: [CASH, BKASH, NAGAD, ROCKET, CARD]

        PaymentStatus:
            type: string
            enum: [PENDING, PAID, FAILED, REFUNDED]

        PrescriptionStatus:
            type: string
            enum: [DRAFT, FINALIZED, PRINTED]

        DrugForm:
            type: string
            enum:
                [
                    TABLET,
                    CAPSULE,
                    SYRUP,
                    INJECTION,
                    INHALER,
                    DROP,
                    CREAM,
                    SUPPOSITORY,
                    PATCH,
                    OTHER,
                ]

        DurationUnit:
            type: string
            enum: [DAYS, WEEKS, MONTHS, YEARS]

        ReferralAgentType:
            type: string
            enum:
                [
                    MARKETING_OFFICER,
                    CLINIC_MANAGER,
                    EXTERNAL_AGENT,
                    DOCTOR,
                    OTHER,
                ]

        CommissionType:
            type: string
            enum: [FLAT, PERCENTAGE, NONE]

        # ── Core models ────────────────────────────────────────────
        User:
            type: object
            properties:
                id: { type: string }
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string, nullable: true }
                role: { $ref: "#/components/schemas/Role" }
                verified: { type: boolean }
                status: { $ref: "#/components/schemas/AccountStatus" }
                createdAt: { type: string, format: date-time }
                updatedAt: { type: string, format: date-time }

        PatientProfile:
            type: object
            properties:
                id: { type: string }
                userId: { type: string }
                regNo: { type: string, nullable: true }
                dateOfBirth: { type: string, format: date, nullable: true }
                sex: { $ref: "#/components/schemas/Sex" }
                bloodGroup: { type: string, nullable: true }
                address: { type: string, nullable: true }
                weightKg: { type: number, nullable: true }
                heightCm: { type: number, nullable: true }

        DoctorProfile:
            type: object
            properties:
                id: { type: string }
                userId: { type: string }
                specialty: { type: string, nullable: true }
                qualifications: { type: string, nullable: true }
                licenseNo: { type: string, nullable: true }
                signatureImageUrl: { type: string, nullable: true }
                clinicName: { type: string, nullable: true }
                clinicAddress: { type: string, nullable: true }
                isAvailable: { type: boolean }

        Appointment:
            type: object
            properties:
                id: { type: string }
                patientId: { type: string }
                doctorId: { type: string }
                bookedById: { type: string, nullable: true }
                serialNo: { type: integer, nullable: true }
                fee: { type: integer }
                appointmentType:
                    { $ref: "#/components/schemas/AppointmentType" }
                status: { $ref: "#/components/schemas/AppointmentStatus" }
                paymentMethod: { $ref: "#/components/schemas/PaymentMethod" }
                paymentStatus: { type: boolean }
                appointmentDate: { type: string, format: date-time }
                location: { type: string, nullable: true }
                chiefComplaint: { type: string, nullable: true }
                notes: { type: string, nullable: true }
                createdAt: { type: string, format: date-time }
                updatedAt: { type: string, format: date-time }

        Prescription:
            type: object
            properties:
                id: { type: string }
                appointmentId: { type: string }
                doctorId: { type: string }
                patientId: { type: string }
                prescriptionDate: { type: string, format: date-time }
                status: { $ref: "#/components/schemas/PrescriptionStatus" }
                headerTemplate: { type: string, nullable: true }
                clinicalNotes: { type: string, nullable: true }
                createdAt: { type: string, format: date-time }
                updatedAt: { type: string, format: date-time }

        ChiefComplaint:
            type: object
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                complaint: { type: string }
                duration: { type: string, nullable: true }
                durationUnit: { $ref: "#/components/schemas/DurationUnit" }
                sortOrder: { type: integer }

        History:
            type: object
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                htn: { type: boolean }
                dm: { type: boolean }
                copd: { type: boolean }
                ihd: { type: boolean }
                ckd: { type: boolean }
                cld: { type: boolean }
                tobaccoChewing: { type: boolean }
                smoking: { type: boolean }
                cvd: { type: boolean }
                asthma: { type: boolean }
                malignancy: { type: boolean }
                allergy: { type: boolean }
                psychiatricDisorder: { type: boolean }
                drugAbuse: { type: boolean }
                depression: { type: boolean }
                otherNotes: { type: string, nullable: true }

        Examination:
            type: object
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                parameter: { type: string, example: "BP" }
                value: { type: string, nullable: true }
                unit: { type: string, nullable: true }
                sortOrder: { type: integer }

        Diagnosis:
            type: object
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                diagnosisText: { type: string }
                sortOrder: { type: integer }

        Investigation:
            type: object
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                investigationName: { type: string }
                sortOrder: { type: integer }

        Drug:
            type: object
            properties:
                id: { type: string }
                brandName: { type: string }
                genericName: { type: string, nullable: true }
                drugClass: { type: string, nullable: true }
                strength: { type: string, nullable: true }
                form: { $ref: "#/components/schemas/DrugForm" }
                isActive: { type: boolean }

        RxItem:
            type: object
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                drugId: { type: string, nullable: true }
                itemNo: { type: integer }
                customBrand: { type: string, nullable: true }
                dose: { type: string, nullable: true }
                instruction: { type: string, nullable: true }
                duration: { type: string, nullable: true }
                sortOrder: { type: integer }

        PrescriptionAdvice:
            type: object
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                adviceText: { type: string, nullable: true }
                nextVisitDate: { type: string, nullable: true }
                fee: { type: number, nullable: true }
                visitNo: { type: integer, nullable: true }
                doctorContact: { type: string, nullable: true }
                emergencyContact: { type: string, nullable: true }
                sortOrder: { type: integer }

        ReportEntry:
            type: object
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                reportDate: { type: string, format: date, nullable: true }
                reportName: { type: string }
                resultValue: { type: string, nullable: true }
                unit: { type: string, nullable: true }

        BmiRecord:
            type: object
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                weightKg: { type: number, nullable: true }
                heightFeet: { type: number, nullable: true }
                heightInches: { type: number, nullable: true }
                bmiValue: { type: number, nullable: true }
                bmiClass: { type: string, nullable: true }
                idealWeightKg: { type: number, nullable: true }
                insulin: { type: number, nullable: true }
                qScore: { type: number, nullable: true }
                wwi: { type: number, nullable: true }
                bild: { type: number, nullable: true }

        DrugHistory:
            type: object
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                drugName: { type: string }
                details: { type: string, nullable: true }
                sortOrder: { type: integer }

        Plan:
            type: object
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                planText: { type: string }
                sortOrder: { type: integer }

        Note:
            type: object
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                noteText: { type: string }
                sortOrder: { type: integer }

        AdviceTemplate:
            type: object
            properties:
                id: { type: string }
                doctorId: { type: string }
                templateName: { type: string }
                adviceText: { type: string }
                isShared: { type: boolean }

        DrugTemplate:
            type: object
            properties:
                id: { type: string }
                doctorId: { type: string }
                templateName: { type: string }
                isShared: { type: boolean }
                items:
                    type: array
                    items:
                        type: object
                        properties:
                            drugId: { type: string, nullable: true }
                            customBrand: { type: string, nullable: true }
                            dose: { type: string, nullable: true }
                            instruction: { type: string, nullable: true }
                            duration: { type: string, nullable: true }
                            sortOrder: { type: integer }

        TreatmentTemplate:
            type: object
            properties:
                id: { type: string }
                doctorId: { type: string }
                templateName: { type: string }
                treatmentNotes: { type: string }
                isShared: { type: boolean }

        PrescriptionTemplate:
            type: object
            properties:
                id: { type: string }
                doctorId: { type: string }
                templateName: { type: string }
                isShared: { type: boolean }
                items:
                    type: array
                    items:
                        type: object
                        properties:
                            drugId: { type: string, nullable: true }
                            customBrand: { type: string, nullable: true }
                            diagnosisText: { type: string, nullable: true }
                            adviceText: { type: string, nullable: true }
                            dose: { type: string, nullable: true }
                            instruction: { type: string, nullable: true }
                            duration: { type: string, nullable: true }
                            sortOrder: { type: integer }

        ReferralAgent:
            type: object
            properties:
                id: { type: string }
                name: { type: string }
                phone: { type: string, nullable: true }
                email: { type: string, nullable: true }
                organization: { type: string, nullable: true }
                agentType: { $ref: "#/components/schemas/ReferralAgentType" }
                commissionType: { $ref: "#/components/schemas/CommissionType" }
                commissionValue: { type: number, nullable: true }
                isActive: { type: boolean }
                notes: { type: string, nullable: true }

        Referral:
            type: object
            properties:
                id: { type: string }
                agentId: { type: string }
                appointmentId: { type: string }
                commissionType: { $ref: "#/components/schemas/CommissionType" }
                commissionValue: { type: number, nullable: true }
                commissionEarned: { type: number, nullable: true }
                isPaid: { type: boolean }
                paidAt: { type: string, format: date-time, nullable: true }
                notes: { type: string, nullable: true }
                createdAt: { type: string, format: date-time }

        Payment:
            type: object
            properties:
                id: { type: string }
                appointmentId: { type: string }
                patientId: { type: string }
                amount: { type: number }
                method: { $ref: "#/components/schemas/PaymentMethod" }
                status: { $ref: "#/components/schemas/PaymentStatus" }
                phoneNumber: { type: string, nullable: true }
                transactionId: { type: string, nullable: true }
                receiptNo: { type: string, nullable: true }
                paymentProof: { type: string, nullable: true }
                note: { type: string, nullable: true }
                paidAt: { type: string, format: date-time, nullable: true }
                createdAt: { type: string, format: date-time }

        AuditLog:
            type: object
            properties:
                id: { type: string }
                userId: { type: string }
                action: { type: string, example: "UPDATE" }
                tableName: { type: string }
                recordId: { type: string, nullable: true }
                changes: { type: object, nullable: true }
                createdAt: { type: string, format: date-time }

        # ── Common responses ───────────────────────────────────────
        Error:
            type: object
            properties:
                success: { type: boolean, example: false }
                message: { type: string }
                errors:
                    type: array
                    items: { type: string }

        PaginatedMeta:
            type: object
            properties:
                total: { type: integer }
                page: { type: integer }
                limit: { type: integer }
                pages: { type: integer }

    # ── REUSABLE PARAMETERS ──────────────────────────────────────
    parameters:
        id:
            name: id
            in: path
            required: true
            schema: { type: string }
        prescriptionId:
            name: prescriptionId
            in: path
            required: true
            schema: { type: string }
        page:
            name: page
            in: query
            schema: { type: integer, default: 1 }
        limit:
            name: limit
            in: query
            schema: { type: integer, default: 20 }

    # ── REUSABLE RESPONSES ───────────────────────────────────────
    responses:
        Unauthorized:
            description: Missing or invalid token
            content:
                application/json:
                    schema: { $ref: "#/components/schemas/Error" }
        Forbidden:
            description: Insufficient role permissions
            content:
                application/json:
                    schema: { $ref: "#/components/schemas/Error" }
        NotFound:
            description: Resource not found
            content:
                application/json:
                    schema: { $ref: "#/components/schemas/Error" }
        ValidationError:
            description: Request body validation failed
            content:
                application/json:
                    schema: { $ref: "#/components/schemas/Error" }

security:
    - BearerAuth: []

# ══════════════════════════════════════════════════════════════
# PATHS
# ══════════════════════════════════════════════════════════════
paths:
    # ── AUTH ──────────────────────────────────────────────────────
    /auth/register:
        post:
            tags: [Auth]
            summary: Register a new user
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [name, email, password]
                            properties:
                                name: { type: string, example: "Rahim Uddin" }
                                email: { type: string, format: email }
                                phone:
                                    { type: string, example: "+8801711000000" }
                                password: { type: string, minLength: 8 }
            responses:
                "201":
                    description: Registered. OTP sent to email.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success: { type: boolean }
                                    message: { type: string }
                                    userId: { type: string }
                "400": { $ref: "#/components/responses/ValidationError" }
                "409":
                    description: Email already registered

    /auth/verify-otp:
        post:
            tags: [Auth]
            summary: Verify OTP for account activation or other flows
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [email, code, type]
                            properties:
                                email: { type: string, format: email }
                                code: { type: string }
                                type:
                                    type: string
                                    enum:
                                        [
                                            ACCOUNT_ACTIVATION,
                                            PASSWORD_RESET,
                                            EMAIL_CHANGE,
                                            TWO_FACTOR_AUTH,
                                        ]
            responses:
                "200": { description: OTP verified successfully }
                "400": { $ref: "#/components/responses/ValidationError" }
                "410": { description: OTP expired or already used }

    /auth/login:
        post:
            tags: [Auth]
            summary: Login and receive tokens
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [email, password]
                            properties:
                                email: { type: string, format: email }
                                password: { type: string }
            responses:
                "200":
                    description: Login successful
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success: { type: boolean }
                                    accessToken: { type: string }
                                    refreshToken: { type: string }
                                    user: { $ref: "#/components/schemas/User" }
                "401": { description: Invalid credentials }
                "403": { description: Account not verified or suspended }

    /auth/refresh:
        post:
            tags: [Auth]
            summary: Exchange refresh token for new access token
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [refreshToken]
                            properties:
                                refreshToken: { type: string }
            responses:
                "200":
                    description: New access token issued
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    accessToken: { type: string }
                "401": { $ref: "#/components/responses/Unauthorized" }

    /auth/logout:
        post:
            tags: [Auth]
            summary: Logout and invalidate refresh token
            responses:
                "200": { description: Logged out }

    /auth/forgot-password:
        post:
            tags: [Auth]
            summary: Send password reset OTP
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [email]
                            properties:
                                email: { type: string, format: email }
            responses:
                "200": { description: OTP sent if account exists }

    /auth/reset-password:
        post:
            tags: [Auth]
            summary: Reset password using verified OTP
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [email, code, newPassword]
                            properties:
                                email: { type: string, format: email }
                                code: { type: string }
                                newPassword: { type: string, minLength: 8 }
            responses:
                "200": { description: Password updated }
                "400": { $ref: "#/components/responses/ValidationError" }

    /auth/2fa/enable:
        post:
            tags: [Auth]
            summary: Enable two-factor authentication
            responses:
                "200": { description: 2FA enabled. OTP sent. }

    /auth/2fa/disable:
        post:
            tags: [Auth]
            summary: Disable two-factor authentication
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [code]
                            properties:
                                code: { type: string }
            responses:
                "200": { description: 2FA disabled }

    # ── USERS ─────────────────────────────────────────────────────
    /users:
        get:
            tags: [Users]
            summary: List all users (Admin)
            parameters:
                - { $ref: "#/components/parameters/page" }
                - { $ref: "#/components/parameters/limit" }
                - name: role
                  in: query
                  schema: { $ref: "#/components/schemas/Role" }
                - name: status
                  in: query
                  schema: { $ref: "#/components/schemas/AccountStatus" }
            responses:
                "200":
                    description: Paginated user list
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        {
                                            type: array,
                                            items:
                                                {
                                                    $ref: "#/components/schemas/User",
                                                },
                                        }
                                    meta:
                                        {
                                            $ref: "#/components/schemas/PaginatedMeta",
                                        }
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }

    /users/{id}:
        get:
            tags: [Users]
            summary: Get user by ID
            parameters: [{ $ref: "#/components/parameters/id" }]
            responses:
                "200":
                    description: User object
                    content:
                        application/json:
                            schema: { $ref: "#/components/schemas/User" }
                "404": { $ref: "#/components/responses/NotFound" }

        patch:
            tags: [Users]
            summary: Update user role or status (Admin)
            parameters: [{ $ref: "#/components/parameters/id" }]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                role: { $ref: "#/components/schemas/Role" }
                                status:
                                    {
                                        $ref: "#/components/schemas/AccountStatus",
                                    }
            responses:
                "200":
                    description: Updated user
                    content:
                        application/json:
                            schema: { $ref: "#/components/schemas/User" }
                "403": { $ref: "#/components/responses/Forbidden" }

    /users/{id}/assign-assistant:
        patch:
            tags: [Users]
            summary: Doctor assigns an assistant by User ID
            parameters: [{ $ref: "#/components/parameters/id" }]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [assistantId]
                            properties:
                                assistantId: { type: string }
            responses:
                "200": { description: Assistant linked }
                "403": { $ref: "#/components/responses/Forbidden" }

    # ── PATIENT PROFILE ───────────────────────────────────────────
    /patients/me:
        get:
            tags: [Patient Profile]
            summary: Get own patient profile
            responses:
                "200":
                    description: Get own patient profile
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/PatientProfile" }

        put:
            tags: [Patient Profile]
            summary: Create or update own patient profile
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                dateOfBirth: { type: string, format: date }
                                sex: { $ref: "#/components/schemas/Sex" }
                                bloodGroup: { type: string }
                                address: { type: string }
                                weightKg: { type: number }
                                heightCm: { type: number }
            responses:
                "200":
                    description: Create or update own patient profile
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/PatientProfile" }

    /patients/{id}:
        get:
            tags: [Patient Profile]
            summary: Get patient profile by ID (Doctor / Admin)
            parameters: [{ $ref: "#/components/parameters/id" }]
            responses:
                "200":
                    description: Get patient profile by ID (Doctor / Admin)
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/PatientProfile" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }

    # ── DOCTOR PROFILE ────────────────────────────────────────────
    /doctors/me:
        get:
            tags: [Doctor Profile]
            summary: Get own doctor profile
            responses:
                "200":
                    description: Get own doctor profile
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/DoctorProfile" }

        put:
            tags: [Doctor Profile]
            summary: Create or update own doctor profile
            requestBody:
                required: true
                content:
