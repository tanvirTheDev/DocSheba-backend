    # ════════════════════════════════════════════════════════════════
    # SAAS PLANS
    # ════════════════════════════════════════════════════════════════

    /saas/plans:
        get:
            tags: [SaaS Plans]
            summary: List all SaaS plans
            description: Public endpoint — no auth required to view available plans.
            security: []
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    {
                                        $ref: "#/components/schemas/SaasPlanResponse",
                                    }
        post:
            tags: [SaaS Plans]
            summary: Create a SaaS plan
            description: Requires SUPER_ADMIN role.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/CreateSaasPlanRequest",
                            }
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/SaasPlanResponse",
                                }

    /saas/plans/{id}:
        get:
            tags: [SaaS Plans]
            summary: Get plan details
            security: []
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/SaasPlanResponse",
                                }
        patch:
            tags: [SaaS Plans]
            summary: Update a SaaS plan
            description: Requires SUPER_ADMIN. Changes only affect new subscriptions.
            parameters:
                - $ref: "#/components/parameters/IdParam"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/CreateSaasPlanRequest",
                            }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/SaasPlanResponse",
                                }

    # ════════════════════════════════════════════════════════════════
    # SUBSCRIPTIONS
    # ════════════════════════════════════════════════════════════════

    /subscriptions:
        post:
            tags: [Subscriptions]
            summary: Subscribe to a SaaS plan
            description: Creates a new subscription for the authenticated ADMIN user. Only one active subscription per user.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/CreateSubscriptionRequest",
                            }
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/SubscriptionResponse",
                                }
                "409": { $ref: "#/components/responses/ConflictError" }

    /subscriptions/me:
        get:
            tags: [Subscriptions]
            summary: Get current user's subscription
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/SubscriptionResponse",
                                }
                "404": { description: No active subscription found. }

    /subscriptions/{id}:
        get:
            tags: [Subscriptions]
            summary: Get subscription by ID (SUPER_ADMIN)
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/SubscriptionResponse",
                                }
        patch:
            tags: [Subscriptions]
            summary: Upgrade/downgrade plan or change billing cycle
            parameters:
                - $ref: "#/components/parameters/IdParam"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                planId: { type: string }
                                billingCycle:
                                    {
                                        $ref: "#/components/schemas/BillingCycle",
                                    }
                                autoRenew: { type: boolean }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/SubscriptionResponse",
                                }

    /subscriptions/{id}/cancel:
        post:
            tags: [Subscriptions]
            summary: Cancel subscription
            description: Sets status to CANCELLED at end of current billing period.
            parameters:
                - $ref: "#/components/parameters/IdParam"
            requestBody:
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/CancelSubscriptionRequest",
                            }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/SubscriptionResponse",
                                }

    # ════════════════════════════════════════════════════════════════
    # INVOICES
    # ════════════════════════════════════════════════════════════════

    /invoices:
        get:
            tags: [Invoices]
            summary: List invoices
            description: Admins see their own invoices. SUPER_ADMIN sees all.
            parameters:
                - $ref: "#/components/parameters/PageParam"
                - $ref: "#/components/parameters/LimitParam"
                - name: subscriptionId
                  in: query
                  schema: { type: string }
                - name: status
                  in: query
                  schema: { $ref: "#/components/schemas/PaymentStatus" }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PaginatedResponse",
                                }

    /invoices/{id}:
        get:
            tags: [Invoices]
            summary: Get invoice by ID
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/InvoiceResponse" }
        patch:
            tags: [Invoices]
            summary: Update invoice payment status (SUPER_ADMIN)
            description: Used to mark an invoice as PAID after manual payment verification.
            parameters:
                - $ref: "#/components/parameters/IdParam"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                status:
                                    {
                                        $ref: "#/components/schemas/PaymentStatus",
                                    }
                                transactionId: { type: string }
                                method:
                                    {
                                        $ref: "#/components/schemas/PaymentMethod",
                                    }
                                paidAt: { type: string, format: date-time }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/InvoiceResponse" }

    # ════════════════════════════════════════════════════════════════
    # AUDIT LOGS
    # ════════════════════════════════════════════════════════════════

    /audit-logs:
        get:
            tags: [Audit Logs]
            summary: List audit logs
            description: Requires ADMIN or SUPER_ADMIN role. Immutable — no write endpoints.
            parameters:
                - $ref: "#/components/parameters/PageParam"
                - $ref: "#/components/parameters/LimitParam"
                - name: userId
                  in: query
                  schema: { type: string }
                  description: Filter by actor user ID.
                - name: action
                  in: query
                  schema:
                      type: string
                      enum: [CREATE, UPDATE, DELETE, LOGIN, PRINT]
                - name: tableName
                  in: query
                  schema: { type: string, example: "Prescription" }
                - name: from
                  in: query
                  schema: { type: string, format: date }
                  description: Start of date range filter.
                - name: to
                  in: query
                  schema: { type: string, format: date }
                  description: End of date range filter.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PaginatedResponse",
                                }
                "401": { $ref: "#/components/responses/UnauthorizedError" }
                "403": { $ref: "#/components/responses/ForbiddenError" }

    /audit-logs/{id}:
        get:
            tags: [Audit Logs]
            summary: Get audit log entry by ID
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/AuditLogResponse",
                                }
                "404": { $ref: "#/components/responses/NotFoundError" }
