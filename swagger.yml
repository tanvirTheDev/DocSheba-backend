    # ════════════════════════════════════════════════════════════════
    # DRUG DATABASE
    # ════════════════════════════════════════════════════════════════

    /drugs:
        get:
            tags: [Drug Database]
            summary: Search drug catalogue
            description: Full-text search across brandName and genericName. Used for Rx autocomplete.
            security: []
            parameters:
                - $ref: "#/components/parameters/PageParam"
                - $ref: "#/components/parameters/LimitParam"
                - name: search
                  in: query
                  schema: { type: string }
                  description: Search term matched against brandName and genericName.
                - name: form
                  in: query
                  schema: { $ref: "#/components/schemas/DrugForm" }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PaginatedResponse",
                                }
        post:
            tags: [Drug Database]
            summary: Add a drug to the catalogue
            description: Requires ADMIN or SUPER_ADMIN role.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            { $ref: "#/components/schemas/CreateDrugRequest" }
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/DrugDatabaseResponse",
                                }

    /drugs/{id}:
        get:
            tags: [Drug Database]
            summary: Get drug by ID
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/DrugDatabaseResponse",
                                }
        patch:
            tags: [Drug Database]
            summary: Update drug entry
            parameters:
                - $ref: "#/components/parameters/IdParam"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            { $ref: "#/components/schemas/CreateDrugRequest" }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/DrugDatabaseResponse",
                                }
        delete:
            tags: [Drug Database]
            summary: Deactivate a drug (soft delete)
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200": { description: Drug deactivated. }

