# @format

openapi: 3.0.3

info:
    title: Healthcare SaaS Platform API
    version: 1.0.0
    description: |
        ## Overview
        REST API for a multi-tenant Healthcare SaaS platform that enables clinics and doctors
        to manage appointments, prescriptions, referrals, billing, and SaaS subscriptions.

        ## Authentication
        All protected endpoints require a Bearer JWT token obtained via `/auth/login`.
        Refresh tokens are issued alongside access tokens and must be used at `/auth/refresh`.

        ## Roles
        | Role | Description |
        |------|-------------|
        | `PATIENT` | Books appointments, views own prescriptions |
        | `DOCTOR` | Manages services, writes prescriptions |
        | `DOCTOR_ASSISTANT` | Books appointments on behalf of doctor |
        | `ADMIN` | Clinic owner — manages staff, views reports, holds SaaS subscription |
        | `SUPER_ADMIN` | Platform owner — manages SaaS plans and all tenants |

        ## Base URL
        `https://api.yourdomain.com/v1`

    contact:
        name: API Support
        email: support@yourdomain.com
    license:
        name: MIT

servers:
    - url: https://api.yourdomain.com/v1
      description: Production
    - url: http://localhost:3000/v1
      description: Local development

tags:
    - name: Auth
      description: Registration, login, token refresh, password reset, 2FA
    - name: Users
      description: User management (admin operations)
    - name: Patient Profile
      description: Patient demographic and health profile
    - name: Doctor Profile
      description: Doctor professional profile and availability
    - name: Doctor Services
      description: Services a doctor offers (in-person, video call, etc.) with individual pricing
    - name: Appointments
      description: Appointment booking, status management, serial numbers
    - name: Payments
      description: Per-appointment payment recording and status tracking
    - name: Prescriptions
      description: Root clinical record attached to a completed appointment
    - name: Chief Complaints
      description: Patient-reported complaints with duration — part of prescription
    - name: History
      description: Medical history flags (HTN, DM, smoking, etc.) — part of prescription
    - name: Examinations
      description: Physical examination parameters (BP, Pulse, SpO2, etc.)
    - name: Diagnoses
      description: Doctor's diagnoses for the visit
    - name: Investigations
      description: Lab / imaging investigations ordered
    - name: Rx Items
      description: Prescribed drug items linked to DrugDatabase or free-text
    - name: Prescription Advice
      description: Follow-up advice, next visit date, emergency contacts
    - name: Report Entries
      description: Patient-uploaded lab/investigation report results
    - name: BMI Record
      description: Anthropometric measurements and calculated BMI
    - name: Drug History
      description: Patient's current or past drug usage history
    - name: Plans
      description: Management plan notes in the prescription
    - name: Notes
      description: Miscellaneous notes at the bottom of the prescription
    - name: Drug Database
      description: Master drug catalogue (brand, generic, form, strength)
    - name: Templates
      description: Reusable prescription templates (advice, drug, treatment, full prescription)
    - name: Referral Agents
      description: Marketing officers, clinic managers, or external agents who refer patients
    - name: Referrals
      description: Referral records linking an agent to an appointment with commission tracking
    - name: SaaS Plans
      description: Platform subscription plan definitions (Free, Basic, Professional, Enterprise)
    - name: Subscriptions
      description: Clinic/admin subscription to a SaaS plan
    - name: Invoices
      description: SaaS billing invoices per subscription cycle
    - name: Audit Logs
      description: Immutable log of all create/update/delete/login/print events

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────────────────────────────────────

components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
            description: "JWT access token obtained from /auth/login. Expires in 15 minutes."

    # ───────────────────────────────────────────────────────────────────────────
    # REUSABLE PARAMETERS
    # ───────────────────────────────────────────────────────────────────────────

    parameters:
        PageParam:
            name: page
            in: query
            schema: { type: integer, default: 1, minimum: 1 }
            description: Page number for pagination (1-based).
        LimitParam:
            name: limit
            in: query
            schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
            description: Number of records per page.
        SortParam:
            name: sort
            in: query
            schema: { type: string, example: "createdAt:desc" }
            description: "Sort field and direction. Format: field:asc or field:desc."
        IdParam:
            name: id
            in: path
            required: true
            schema: { type: string, example: "clx1abc123" }
            description: CUID identifier of the resource.

    # ───────────────────────────────────────────────────────────────────────────
    # REUSABLE RESPONSES
    # ───────────────────────────────────────────────────────────────────────────

    responses:
        UnauthorizedError:
            description: Missing or invalid JWT token.
            content:
                application/json:
                    schema: { $ref: "#/components/schemas/ErrorResponse" }
                    example:
                        { success: false, message: "Unauthorized", code: 401 }
        ForbiddenError:
            description: Authenticated but insufficient role/permissions.
            content:
                application/json:
                    schema: { $ref: "#/components/schemas/ErrorResponse" }
                    example: { success: false, message: "Forbidden", code: 403 }
        NotFoundError:
            description: Resource not found.
            content:
                application/json:
                    schema: { $ref: "#/components/schemas/ErrorResponse" }
                    example:
                        {
                            success: false,
                            message: "Resource not found",
                            code: 404,
                        }
        ValidationError:
            description: Request body / query parameter validation failed.
            content:
                application/json:
                    schema:
                        { $ref: "#/components/schemas/ValidationErrorResponse" }
        ConflictError:
            description: Duplicate resource or constraint violation.
            content:
                application/json:
                    schema: { $ref: "#/components/schemas/ErrorResponse" }
                    example:
                        {
                            success: false,
                            message: "Email already registered",
                            code: 409,
                        }

    # ───────────────────────────────────────────────────────────────────────────
    # SCHEMAS
    # ───────────────────────────────────────────────────────────────────────────

    schemas:
        # ── Generic wrappers ─────────────────────────────────────────────────────

        SuccessResponse:
            type: object
            description: Standard success envelope returned by all successful endpoints.
            properties:
                success:
                    type: boolean
                    example: true
                message:
                    type: string
                    example: "Operation successful"
                data:
                    description: Payload varies by endpoint.

        PaginatedResponse:
            type: object
            description: Paginated list envelope.
            properties:
                success: { type: boolean, example: true }
                data:
                    type: array
                    items: {}
                meta:
                    type: object
                    properties:
                        total:
                            {
                                type: integer,
                                example: 142,
                                description: Total matching records.,
                            }
                        page: { type: integer, example: 1 }
                        limit: { type: integer, example: 20 }
                        totalPages: { type: integer, example: 8 }

        ErrorResponse:
            type: object
            description: Standard error envelope.
            properties:
                success: { type: boolean, example: false }
                message: { type: string, example: "Something went wrong" }
                code: { type: integer, example: 500 }

        ValidationErrorResponse:
            type: object
            description: Validation error with per-field details.
            properties:
                success: { type: boolean, example: false }
                message: { type: string, example: "Validation failed" }
                errors:
                    type: array
                    items:
                        type: object
                        properties:
                            field: { type: string, example: "email" }
                            message:
                                {
                                    type: string,
                                    example: "Must be a valid email address",
                                }

        # ── ENUMS ────────────────────────────────────────────────────────────────

        Role:
            type: string
            enum: [PATIENT, DOCTOR, DOCTOR_ASSISTANT, ADMIN, SUPER_ADMIN]
            description: |
                User role controlling access and capabilities.
                - `PATIENT` – end user who books appointments
                - `DOCTOR` – licensed practitioner
                - `DOCTOR_ASSISTANT` – supports a doctor
                - `ADMIN` – clinic owner / manager
                - `SUPER_ADMIN` – SaaS platform owner

        AccountStatus:
            type: string
            enum: [PENDING, ACTIVE, INACTIVE, SUSPENDED]
            description: |
                Lifecycle status of a user account.
                - `PENDING` – registered but email not verified
                - `ACTIVE` – verified and operational
                - `INACTIVE` – voluntarily deactivated
                - `SUSPENDED` – blocked by admin

        Sex:
            type: string
            enum: [MALE, FEMALE, OTHER]
            description: Biological sex of the patient.

        ServiceType:
            type: string
            enum:
                [
                    IN_PERSON,
                    VIDEO_CALL,
                    AUDIO_CALL,
                    CHAT,
                    HOME_VISIT,
                    REPORT_REVIEW,
                ]
            description: |
                Type of medical service offered by a doctor.
                - `IN_PERSON` – physical clinic visit
                - `VIDEO_CALL` – live video consultation
                - `AUDIO_CALL` – phone / audio only
                - `CHAT` – async text-based consultation
                - `HOME_VISIT` – doctor travels to patient's home
                - `REPORT_REVIEW` – patient uploads reports for async review

        AppointmentStatus:
            type: string
            enum: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED]
            description: |
                Lifecycle of an appointment.
                - `PENDING` – booked, awaiting confirmation
                - `CONFIRMED` – confirmed by doctor/admin
                - `IN_PROGRESS` – consultation ongoing
                - `COMPLETED` – visit ended, prescription may exist
                - `CANCELLED` – cancelled by any party

        PaymentMethod:
            type: string
            enum: [CASH, BKASH, NAGAD, ROCKET, CARD]
            description: Payment channel used for the transaction.

        PaymentStatus:
            type: string
            enum: [PENDING, PAID, FAILED, REFUNDED]
            description: Current status of a payment record.

        PrescriptionStatus:
            type: string
            enum: [DRAFT, FINALIZED, PRINTED]
            description: |
                - `DRAFT` – doctor is still editing
                - `FINALIZED` – locked for editing
                - `PRINTED` – physical or PDF copy generated

        DrugForm:
            type: string
            enum:
                [
                    TABLET,
                    CAPSULE,
                    SYRUP,
                    INJECTION,
                    INHALER,
                    DROP,
                    CREAM,
                    SUPPOSITORY,
                    PATCH,
                    OTHER,
                ]
            description: Physical form / dosage form of the drug.

        DurationUnit:
            type: string
            enum: [DAYS, WEEKS, MONTHS, YEARS]
            description: Unit for the duration of a chief complaint.

        ReferralAgentType:
            type: string
            enum:
                [
                    MARKETING_OFFICER,
                    CLINIC_MANAGER,
                    EXTERNAL_AGENT,
                    DOCTOR,
                    OTHER,
                ]
            description: Classification of the referral agent.

        CommissionType:
            type: string
            enum: [FLAT, PERCENTAGE, NONE]
            description: |
                How commission is calculated for a referral agent.
                - `FLAT` – fixed BDT amount per referred patient
                - `PERCENTAGE` – percentage of the appointment fee
                - `NONE` – no commission

        PlanTier:
            type: string
            enum: [FREE, BASIC, PROFESSIONAL, ENTERPRISE]
            description: SaaS subscription tier level.

        SubscriptionStatus:
            type: string
            enum: [ACTIVE, EXPIRED, CANCELLED, TRIAL, PAST_DUE]
            description: |
                - `TRIAL` – free trial period
                - `ACTIVE` – paid and operational
                - `PAST_DUE` – payment overdue
                - `EXPIRED` – subscription period ended
                - `CANCELLED` – explicitly cancelled

        BillingCycle:
            type: string
            enum: [MONTHLY, YEARLY]
            description: How frequently the subscription is billed.

        # ── AUTH ─────────────────────────────────────────────────────────────────

        RegisterRequest:
            type: object
            required: [name, email, password, role]
            description: Payload to register a new user account.
            properties:
                name:
                    type: string
                    minLength: 2
                    maxLength: 100
                    example: "Dr. Arif Hossain"
                    description: Full name of the user.
                email:
                    type: string
                    format: email
                    example: "arif@example.com"
                    description: Unique email address used for login and notifications.
                phone:
                    type: string
                    example: "+8801712345678"
                    description: Optional Bangladeshi mobile number in E.164 format.
                password:
                    type: string
                    format: password
                    minLength: 8
                    example: "SecurePass123!"
                    description: "Password. Must be at least 8 characters with 1 uppercase, 1 number."
                role:
                    $ref: "#/components/schemas/Role"

        LoginRequest:
            type: object
            required: [email, password]
            description: Credentials for obtaining a JWT access token.
            properties:
                email:
                    type: string
                    format: email
                    example: "arif@example.com"
                password:
                    type: string
                    format: password
                    example: "SecurePass123!"

        AuthTokenResponse:
            type: object
            description: JWT token pair returned on successful login or token refresh.
            properties:
                accessToken:
                    type: string
                    description: "Short-lived JWT (15 min). Include in Authorization: Bearer <token>."
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                refreshToken:
                    type: string
                    description: "Long-lived token (7 days). Store securely; used at /auth/refresh."
                    example: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
                user:
                    $ref: "#/components/schemas/UserResponse"

        RefreshRequest:
            type: object
            required: [refreshToken]
            properties:
                refreshToken:
                    type: string
                    description: The refresh token issued at login.

        ForgotPasswordRequest:
            type: object
            required: [email]
            properties:
                email:
                    type: string
                    format: email
                    description: Email address to send the password reset code to.

        ResetPasswordRequest:
            type: object
            required: [email, code, newPassword]
            properties:
                email:
                    type: string
                    format: email
                code:
                    type: string
                    example: "483921"
                    description: 6-digit OTP sent to the user's email.
                newPassword:
                    type: string
                    format: password
                    minLength: 8
                    description: New password to set.

        VerifyEmailRequest:
            type: object
            required: [email, code]
            properties:
                email:
                    type: string
                    format: email
                code:
                    type: string
                    example: "291847"
                    description: 6-digit OTP sent on registration.

        ChangePasswordRequest:
            type: object
            required: [currentPassword, newPassword]
            properties:
                currentPassword:
                    type: string
                    format: password
                newPassword:
                    type: string
                    format: password
                    minLength: 8

        # ── USER ─────────────────────────────────────────────────────────────────

        UserResponse:
            type: object
            description: Public representation of a user account.
            properties:
                id: { type: string, example: "clx1abc123" }
                name: { type: string, example: "Dr. Arif Hossain" }
                email: { type: string, example: "arif@example.com" }
                phone:
                    { type: string, example: "+8801712345678", nullable: true }
                role: { $ref: "#/components/schemas/Role" }
                verified: { type: boolean, example: true }
                status: { $ref: "#/components/schemas/AccountStatus" }
                createdAt: { type: string, format: date-time }
                updatedAt: { type: string, format: date-time }

        UpdateUserRequest:
            type: object
            description: Fields that a user can update on their own account.
            properties:
                name:
                    type: string
                    minLength: 2
                    maxLength: 100
                    description: Updated full name.
                phone:
                    type: string
                    description: Updated phone number in E.164 format.

        # ── PATIENT PROFILE ───────────────────────────────────────────────────────

        PatientProfileResponse:
            type: object
            description: Extended demographic and health profile of a patient.
            properties:
                id: { type: string }
                userId: { type: string, description: "FK to User." }
                regNo:
                    type: string
                    nullable: true
                    example: "PAT-20240001"
                    description: Auto-generated or manually assigned clinic registration number.
                dateOfBirth:
                    type: string
                    format: date
                    nullable: true
                    example: "1990-05-15"
                sex:
                    $ref: "#/components/schemas/Sex"
                    nullable: true
                bloodGroup:
                    type: string
                    nullable: true
                    example: "B+"
                    description: "ABO blood group. e.g. A+, B-, O+, AB+"
                address:
                    type: string
                    nullable: true
                    example: "12/A, Banani, Dhaka"
                weightKg:
                    type: number
                    format: float
                    nullable: true
                    example: 68.5
                    description: Body weight in kilograms.
                heightCm:
                    type: number
                    format: float
                    nullable: true
                    example: 170.0
                    description: Height in centimetres.
                createdAt: { type: string, format: date-time }
                updatedAt: { type: string, format: date-time }

        UpsertPatientProfileRequest:
            type: object
            description: Create or update a patient's profile. All fields are optional for partial updates.
            properties:
                dateOfBirth:
                    type: string
                    format: date
                    example: "1990-05-15"
                sex:
                    $ref: "#/components/schemas/Sex"
                bloodGroup:
                    type: string
                    example: "B+"
                address:
                    type: string
                    example: "12/A, Banani, Dhaka"
                weightKg:
                    type: number
                    example: 68.5
                heightCm:
                    type: number
                    example: 170.0

        # ── DOCTOR PROFILE ────────────────────────────────────────────────────────

        DoctorProfileResponse:
            type: object
            description: Professional profile of a registered doctor.
            properties:
                id: { type: string }
                userId: { type: string }
                specialty:
                    type: string
                    nullable: true
                    example: "Cardiology"
                    description: Medical specialty of the doctor.
                qualifications:
                    type: string
                    nullable: true
                    example: "MBBS, MD (Cardiology), FCPS"
                    description: Comma-separated academic qualifications.
                licenseNo:
                    type: string
                    nullable: true
                    example: "BMDC-12345"
                    description: BMDC or national medical council license number.
                signatureImageUrl:
                    type: string
                    format: uri
                    nullable: true
                    description: Cloudinary / S3 URL of the doctor's digital signature image.
                clinicName:
                    type: string
                    nullable: true
                    example: "Hossain Cardiology Centre"
                clinicAddress:
                    type: string
                    nullable: true
                    example: "House 5, Road 12, Dhanmondi, Dhaka"
                isAvailable:
                    type: boolean
                    example: true
                    description: Whether the doctor is currently accepting new appointments.
                createdAt: { type: string, format: date-time }
                updatedAt: { type: string, format: date-time }

        UpsertDoctorProfileRequest:
            type: object
            description: Create or update a doctor's professional profile.
            properties:
                specialty: { type: string, example: "Cardiology" }
                qualifications:
                    { type: string, example: "MBBS, MD (Cardiology)" }
                licenseNo: { type: string, example: "BMDC-12345" }
                signatureImageUrl: { type: string, format: uri }
                clinicName:
                    { type: string, example: "Hossain Cardiology Centre" }
                clinicAddress:
                    {
                        type: string,
                        example: "House 5, Road 12, Dhanmondi, Dhaka",
                    }
                isAvailable: { type: boolean, example: true }

        # ── DOCTOR SERVICE ────────────────────────────────────────────────────────

        DoctorServiceResponse:
            type: object
            description: A single service type offered by a doctor with its pricing and duration.
            properties:
                id: { type: string }
                doctorId: { type: string, description: "FK to User (doctor)." }
                serviceType: { $ref: "#/components/schemas/ServiceType" }
                fee:
                    type: number
                    format: float
                    example: 800.00
                    description: Consultation fee in BDT for this service type.
                duration:
                    type: integer
                    example: 30
                    description: Scheduled duration of the service in minutes.
                isActive:
                    type: boolean
                    example: true
                    description: Whether this service is currently bookable by patients.
                description:
                    type: string
                    nullable: true
                    example: "Includes prescription and follow-up advice"
                    description: Short description shown to the patient during booking.
                createdAt: { type: string, format: date-time }
                updatedAt: { type: string, format: date-time }

        CreateDoctorServiceRequest:
            type: object
            required: [serviceType, fee, duration]
            description: Define a new service type for the authenticated doctor.
            properties:
                serviceType: { $ref: "#/components/schemas/ServiceType" }
                fee:
                    type: number
                    example: 800.00
                    description: Fee in BDT.
                duration:
                    type: integer
                    example: 30
                    description: Duration in minutes.
                description:
                    type: string
                    example: "Includes prescription and follow-up advice"
                isActive:
                    type: boolean
                    default: true

        UpdateDoctorServiceRequest:
            type: object
            description: Partial update for an existing doctor service.
            properties:
                fee: { type: number, example: 1000.00 }
                duration: { type: integer, example: 45 }
                description: { type: string }
                isActive: { type: boolean }

        # ── APPOINTMENT ───────────────────────────────────────────────────────────

        AppointmentResponse:
            type: object
            description: Full appointment record including patient, doctor, service, and call details.
            properties:
                id: { type: string }
                patientId:
                    { type: string, description: "FK to User (patient)." }
                doctorId: { type: string, description: "FK to User (doctor)." }
                bookedById:
                    type: string
                    nullable: true
                    description: "FK to User who created the booking (patient, admin, or assistant)."
                serviceId:
                    type: string
                    nullable: true
                    description: "FK to DoctorService. Null if service was manually set."
                serviceType: { $ref: "#/components/schemas/ServiceType" }
                serialNo:
                    type: integer
                    nullable: true
                    example: 7
                    description: Daily token number for this doctor. e.g. Serial #7.
                fee:
                    type: integer
                    example: 800
                    description: Appointment fee in BDT at time of booking.
                status: { $ref: "#/components/schemas/AppointmentStatus" }
                paymentMethod: { $ref: "#/components/schemas/PaymentMethod" }
                paymentStatus:
                    type: boolean
                    example: false
                    description: Quick flag — true if at least one PAID payment exists for this appointment.
                appointmentDate:
                    type: string
                    format: date-time
                    example: "2024-06-15T10:30:00Z"
                    description: Scheduled date and time of the appointment.
                location:
                    type: string
                    nullable: true
                    example: "Room 3, 2nd Floor"
                    description: Physical room or location within the clinic.
                chiefComplaint:
                    type: string
                    nullable: true
                    example: "Chest pain for 3 days"
                    description: Brief chief complaint captured at booking time.
                notes:
                    type: string
                    nullable: true
                    description: Internal notes added by admin or assistant.
                callRoomId:
                    type: string
                    nullable: true
                    example: "daily-room-xyz123"
                    description: Video/audio call room ID (Daily.co, Jitsi, etc.). Populated for VIDEO_CALL/AUDIO_CALL.
                callStartedAt:
                    type: string
                    format: date-time
                    nullable: true
                    description: Timestamp when the call session actually started.
                callEndedAt:
                    type: string
                    format: date-time
                    nullable: true
                    description: Timestamp when the call session ended.
                callDurationMin:
                    type: integer
                    nullable: true
                    example: 22
                    description: Actual call duration in minutes (callEndedAt - callStartedAt).
                callRecordingUrl:
                    type: string
                    format: uri
                    nullable: true
                    description: URL to the recorded call session (if recording is enabled on the plan).
                createdAt: { type: string, format: date-time }
                updatedAt: { type: string, format: date-time }

        CreateAppointmentRequest:
            type: object
            required: [patientId, doctorId, serviceType, fee, appointmentDate]
            description: "Book a new appointment. serialNo is auto-assigned by the server."
            properties:
                patientId:
                    type: string
                    description: ID of the patient. Required.
                doctorId:
                    type: string
                    description: ID of the doctor. Required.
                serviceId:
                    type: string
                    description: "Optional FK to DoctorService. If provided, fee and serviceType are auto-filled."
                serviceType:
                    $ref: "#/components/schemas/ServiceType"
                fee:
                    type: integer
                    example: 800
                    description: Fee in BDT. Ignored if serviceId is provided.
                paymentMethod:
                    $ref: "#/components/schemas/PaymentMethod"
                appointmentDate:
                    type: string
                    format: date-time
                    example: "2024-06-15T10:30:00Z"
                location:
                    type: string
                    example: "Room 3, 2nd Floor"
                chiefComplaint:
                    type: string
                    example: "Chest pain for 3 days"
                notes:
                    type: string
                referralAgentId:
                    type: string
                    nullable: true
                    description: If provided, creates a Referral record and calculates commission automatically.

        UpdateAppointmentRequest:
            type: object
            description: Update mutable fields of an existing appointment.
            properties:
                status: { $ref: "#/components/schemas/AppointmentStatus" }
                appointmentDate: { type: string, format: date-time }
                location: { type: string }
                chiefComplaint: { type: string }
                notes: { type: string }
                paymentMethod: { $ref: "#/components/schemas/PaymentMethod" }
                callRoomId: { type: string }
                callStartedAt: { type: string, format: date-time }
                callEndedAt: { type: string, format: date-time }
                callRecordingUrl: { type: string, format: uri }

        # ── PAYMENT ───────────────────────────────────────────────────────────────

        PaymentResponse:
            type: object
            description: A payment transaction record for an appointment.
            properties:
                id: { type: string }
                appointmentId: { type: string }
                patientId: { type: string }
                amount:
                    type: number
                    format: float
                    example: 800.00
                    description: Amount paid in BDT.
                method: { $ref: "#/components/schemas/PaymentMethod" }
                status: { $ref: "#/components/schemas/PaymentStatus" }
                phoneNumber:
                    type: string
                    nullable: true
                    example: "+8801712345678"
                    description: Mobile number used for bKash/Nagad/Rocket transactions.
                transactionId:
                    type: string
                    nullable: true
                    example: "BKD20240615ABC"
                    description: Unique transaction ID from the payment gateway.
                receiptNo:
                    type: string
                    nullable: true
                    example: "RCP-20240615-0042"
                    description: Clinic-issued receipt number.
                paymentProof:
                    type: string
                    format: uri
                    nullable: true
                    description: URL to screenshot or proof of payment (Cloudinary/S3).
                note:
                    type: string
                    nullable: true
                    description: Internal note about this payment.
                paidAt:
                    type: string
                    format: date-time
                    nullable: true
                    description: Timestamp when payment was confirmed.
                createdAt: { type: string, format: date-time }
                updatedAt: { type: string, format: date-time }

        CreatePaymentRequest:
            type: object
            required: [appointmentId, patientId, amount, method]
            description: Record a payment for an appointment.
            properties:
                appointmentId: { type: string }
                patientId: { type: string }
                amount:
                    type: number
                    example: 800.00
                    description: Amount in BDT.
                method: { $ref: "#/components/schemas/PaymentMethod" }
                phoneNumber:
                    type: string
                    example: "+8801712345678"
                    description: Required for bKash, Nagad, Rocket.
                transactionId:
                    type: string
                    example: "BKD20240615ABC"
                note: { type: string }

        # ── PRESCRIPTION ──────────────────────────────────────────────────────────

        PrescriptionResponse:
            type: object
            description: Root clinical record for a completed appointment. Contains all clinical sub-sections.
            properties:
                id: { type: string }
                appointmentId:
                    {
                        type: string,
                        description: "One-to-one FK to Appointment.",
                    }
                doctorId: { type: string }
                patientId: { type: string }
                prescriptionDate:
                    type: string
                    format: date-time
                    description: Date and time the prescription was created.
                status: { $ref: "#/components/schemas/PrescriptionStatus" }
                headerTemplate:
                    type: string
                    nullable: true
                    description: Custom header text or template name used when printing the prescription.
                clinicalNotes:
                    type: string
                    nullable: true
                    description: General free-text clinical notes by the doctor.
                createdAt: { type: string, format: date-time }
                updatedAt: { type: string, format: date-time }

        CreatePrescriptionRequest:
            type: object
            required: [appointmentId]
            description: Initialise a new prescription for a completed appointment. Status defaults to DRAFT.
            properties:
                appointmentId: { type: string }
                headerTemplate: { type: string }
                clinicalNotes: { type: string }

        UpdatePrescriptionRequest:
            type: object
            description: Update prescription metadata or promote status.
            properties:
                status: { $ref: "#/components/schemas/PrescriptionStatus" }
                headerTemplate: { type: string }
                clinicalNotes: { type: string }

        # ── CHIEF COMPLAINT ───────────────────────────────────────────────────────

        ChiefComplaintResponse:
            type: object
            description: A single patient-reported complaint with optional duration.
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                complaint:
                    type: string
                    example: "Chest pain"
                    description: Name or description of the complaint.
                duration:
                    type: string
                    nullable: true
                    example: "3"
                    description: Numeric duration value (paired with durationUnit).
                durationUnit:
                    $ref: "#/components/schemas/DurationUnit"
                    nullable: true
                sortOrder:
                    type: integer
                    example: 0
                    description: Display order within the prescription.

        ChiefComplaintRequest:
            type: object
            required: [complaint]
            properties:
                complaint: { type: string, example: "Chest pain" }
                duration: { type: string, example: "3" }
                durationUnit: { $ref: "#/components/schemas/DurationUnit" }
                sortOrder: { type: integer, default: 0 }

        # ── HISTORY ───────────────────────────────────────────────────────────────

        HistoryResponse:
            type: object
            description: Medical co-morbidity and lifestyle history flags. One record per prescription.
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                htn:
                    {
                        type: boolean,
                        example: true,
                        description: "Hypertension.",
                    }
                dm:
                    {
                        type: boolean,
                        example: false,
                        description: "Diabetes mellitus.",
                    }
                copd:
                    {
                        type: boolean,
                        example: false,
                        description: "Chronic obstructive pulmonary disease.",
                    }
                ihd:
                    {
                        type: boolean,
                        example: false,
                        description: "Ischaemic heart disease.",
                    }
                ckd:
                    {
                        type: boolean,
                        example: false,
                        description: "Chronic kidney disease.",
                    }
                cld:
                    {
                        type: boolean,
                        example: false,
                        description: "Chronic liver disease.",
                    }
                tobaccoChewing: { type: boolean, example: false }
                smoking: { type: boolean, example: true }
                cvd:
                    {
                        type: boolean,
                        example: false,
                        description: "Cerebrovascular disease.",
                    }
                asthma: { type: boolean, example: false }
                malignancy: { type: boolean, example: false }
                allergy: { type: boolean, example: false }
                psychiatricDisorder: { type: boolean, example: false }
                drugAbuse: { type: boolean, example: false }
                depression: { type: boolean, example: false }
                otherNotes:
                    type: string
                    nullable: true
                    example: "Family history of coronary artery disease"
                    description: Free-text for any additional history not covered by flags.

        HistoryRequest:
            type: object
            description: All fields are optional; omitted fields default to false.
            properties:
                htn: { type: boolean }
                dm: { type: boolean }
                copd: { type: boolean }
                ihd: { type: boolean }
                ckd: { type: boolean }
                cld: { type: boolean }
                tobaccoChewing: { type: boolean }
                smoking: { type: boolean }
                cvd: { type: boolean }
                asthma: { type: boolean }
                malignancy: { type: boolean }
                allergy: { type: boolean }
                psychiatricDisorder: { type: boolean }
                drugAbuse: { type: boolean }
                depression: { type: boolean }
                otherNotes: { type: string }

        # ── EXAMINATION ───────────────────────────────────────────────────────────

        ExaminationResponse:
            type: object
            description: A single on-examination parameter and its measured value.
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                parameter:
                    type: string
                    example: "BP"
                    description: "Parameter name. Common values: BP, Pulse, Temp, SpO2, Heart, Lungs, Abd, Anaemia, Jaundice, Cyanosis, Oedema."
                value:
                    type: string
                    nullable: true
                    example: "130/80"
                    description: Measured value as a string to allow descriptive entries (e.g. 'Normal', '130/80').
                unit:
                    type: string
                    nullable: true
                    example: "mmHg"
                    description: Unit of the measurement where applicable.
                sortOrder: { type: integer, example: 0 }

        ExaminationRequest:
            type: object
            required: [parameter]
            properties:
                parameter: { type: string, example: "BP" }
                value: { type: string, example: "130/80" }
                unit: { type: string, example: "mmHg" }
                sortOrder: { type: integer, default: 0 }

        # ── DIAGNOSIS ─────────────────────────────────────────────────────────────

        DiagnosisResponse:
            type: object
            description: A single diagnosis entry within a prescription.
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                diagnosisText:
                    type: string
                    example: "Essential Hypertension (ICD-10: I10)"
                    description: Free-text diagnosis. Recommended to include ICD-10 code where available.
                sortOrder: { type: integer }

        DiagnosisRequest:
            type: object
            required: [diagnosisText]
            properties:
                diagnosisText:
                    {
                        type: string,
                        example: "Essential Hypertension (ICD-10: I10)",
                    }
                sortOrder: { type: integer, default: 0 }

        # ── INVESTIGATION ─────────────────────────────────────────────────────────

        InvestigationResponse:
            type: object
            description: A laboratory or imaging investigation ordered by the doctor.
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                investigationName:
                    type: string
                    example: "ECG"
                    description: Name of the investigation ordered (e.g. CBC, ECG, Chest X-Ray, Lipid Profile).
                sortOrder: { type: integer }

        InvestigationRequest:
            type: object
            required: [investigationName]
            properties:
                investigationName: { type: string, example: "ECG" }
                sortOrder: { type: integer, default: 0 }

        # ── RX ITEM ───────────────────────────────────────────────────────────────

        RxItemResponse:
            type: object
            description: A single drug item in the prescription's Rx list.
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                drugId:
                    type: string
                    nullable: true
                    description: "FK to DrugDatabase. Null if using free-text customBrand."
                itemNo:
                    type: integer
                    example: 1
                    description: Display number in the Rx list (1, 2, 3...).
                customBrand:
                    type: string
                    nullable: true
                    example: "Paracetamol"
                    description: Free-text brand name when drug is not in the master catalogue.
                dose:
                    type: string
                    nullable: true
                    example: "500mg"
                    description: Dose per administration.
                instruction:
                    type: string
                    nullable: true
                    example: "খাবার পরে"
                    description: Administration instruction (supports Bengali text).
                duration:
                    type: string
                    nullable: true
                    example: "৭ দিন"
                    description: Duration of the drug course (supports Bengali text).
                sortOrder: { type: integer }

        RxItemRequest:
            type: object
            required: [itemNo]
            properties:
                drugId:
                    {
                        type: string,
                        description: "FK to DrugDatabase. Either this or customBrand is required.",
                    }
                itemNo: { type: integer, example: 1 }
                customBrand: { type: string, example: "Paracetamol" }
                dose: { type: string, example: "500mg" }
                instruction: { type: string, example: "খাবার পরে" }
                duration: { type: string, example: "৭ দিন" }
                sortOrder: { type: integer, default: 0 }

        # ── PRESCRIPTION ADVICE ───────────────────────────────────────────────────

        PrescriptionAdviceResponse:
            type: object
            description: Follow-up advice, next visit scheduling, and emergency contact information.
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                adviceText:
                    type: string
                    nullable: true
                    example: "Avoid salty food and reduce stress"
                    description: General lifestyle or treatment advice for the patient.
                nextVisitDate:
                    type: string
                    nullable: true
                    example: "After 2 weeks"
                    description: Free-text next visit instruction (not a strict date for flexibility).
                fee:
                    type: number
                    nullable: true
                    example: 800.00
                    description: Fee for the next visit in BDT.
                visitNo:
                    type: integer
                    nullable: true
                    example: 2
                    description: Sequential visit number for follow-up tracking.
                doctorContact:
                    type: string
                    nullable: true
                    example: "+8801700000000"
                    description: Doctor's direct contact number shown on the prescription.
                emergencyContact:
                    type: string
                    nullable: true
                    example: "+8809999999"
                    description: Emergency contact number for the patient.
                sortOrder: { type: integer }

        PrescriptionAdviceRequest:
            type: object
            properties:
                adviceText: { type: string }
                nextVisitDate: { type: string, example: "After 2 weeks" }
                fee: { type: number, example: 800.00 }
                visitNo: { type: integer }
                doctorContact: { type: string }
                emergencyContact: { type: string }
                sortOrder: { type: integer, default: 0 }

        # ── REPORT ENTRY ──────────────────────────────────────────────────────────

        ReportEntryResponse:
            type: object
            description: A patient-uploaded or manually recorded investigation result.
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                reportDate:
                    type: string
                    format: date
                    nullable: true
                    description: Date the report was issued by the lab.
                reportName:
                    type: string
                    example: "HbA1c"
                    description: Name of the investigation whose result is being recorded.
                resultValue:
                    type: string
                    nullable: true
                    example: "7.2"
                    description: Measured result value.
                unit:
                    type: string
                    nullable: true
                    example: "%"
                    description: Unit of the result.

        ReportEntryRequest:
            type: object
            required: [reportName]
            properties:
                reportDate: { type: string, format: date }
                reportName: { type: string, example: "HbA1c" }
                resultValue: { type: string, example: "7.2" }
                unit: { type: string, example: "%" }

        # ── BMI RECORD ────────────────────────────────────────────────────────────

        BmiRecordResponse:
            type: object
            description: Anthropometric measurements and derived BMI values. One record per prescription.
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                weightKg:
                    type: number
                    nullable: true
                    example: 72.5
                    description: Weight in kilograms.
                heightFeet:
                    type: number
                    nullable: true
                    example: 5
                    description: Height — feet component.
                heightInches:
                    type: number
                    nullable: true
                    example: 7
                    description: Height — inches component.
                bmiValue:
                    type: number
                    nullable: true
                    example: 24.8
                    description: Calculated BMI (kg/m²).
                bmiClass:
                    type: string
                    nullable: true
                    example: "Normal"
                    description: "WHO BMI classification: Underweight | Normal | Overweight | Obese."
                idealWeightKg:
                    type: number
                    nullable: true
                    example: 70.0
                    description: Calculated ideal body weight in kg.
                insulin:
                    type: number
                    nullable: true
                    description: Fasting insulin level if recorded.
                qScore:
                    type: number
                    nullable: true
                    description: Q-score metabolic risk metric.
                wwi:
                    type: number
                    nullable: true
                    description: Weight-to-waist index.
                bild:
                    type: number
                    nullable: true
                    description: Body image and lifestyle derived score.

        BmiRecordRequest:
            type: object
            description: All fields optional — server calculates bmiValue and bmiClass from weight and height.
            properties:
                weightKg: { type: number, example: 72.5 }
                heightFeet: { type: number, example: 5 }
                heightInches: { type: number, example: 7 }
                insulin: { type: number }
                qScore: { type: number }
                wwi: { type: number }
                bild: { type: number }

        # ── DRUG HISTORY ──────────────────────────────────────────────────────────

        DrugHistoryResponse:
            type: object
            description: A drug currently or previously taken by the patient.
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                drugName:
                    type: string
                    example: "Amlodipine 5mg"
                    description: Brand or generic name of the drug.
                details:
                    type: string
                    nullable: true
                    example: "1 tablet daily for 6 months"
                    description: Dose, frequency, and duration details.
                sortOrder: { type: integer }

        DrugHistoryRequest:
            type: object
            required: [drugName]
            properties:
                drugName: { type: string }
                details: { type: string }
                sortOrder: { type: integer, default: 0 }

        # ── PLAN ──────────────────────────────────────────────────────────────────

        PlanResponse:
            type: object
            description: A management plan item within the prescription.
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                planText:
                    type: string
                    example: "Lifestyle modification — low sodium diet, 30 min walk daily"
                    description: A single management plan line.
                sortOrder: { type: integer }

        PlanRequest:
            type: object
            required: [planText]
            properties:
                planText: { type: string }
                sortOrder: { type: integer, default: 0 }

        # ── NOTE ──────────────────────────────────────────────────────────────────

        NoteResponse:
            type: object
            description: A miscellaneous note at the bottom of the prescription.
            properties:
                id: { type: string }
                prescriptionId: { type: string }
                noteText:
                    type: string
                    example: "Patient allergic to Penicillin"
                    description: Free-text note visible on the printed prescription.
                sortOrder: { type: integer }

        NoteRequest:
            type: object
            required: [noteText]
            properties:
                noteText: { type: string }
                sortOrder: { type: integer, default: 0 }

        # ── DRUG DATABASE ─────────────────────────────────────────────────────────

        DrugDatabaseResponse:
            type: object
            description: A drug entry from the master catalogue used for Rx autocomplete.
            properties:
                id: { type: string }
                brandName:
                    type: string
                    example: "Napa"
                    description: Commercial brand name of the drug.
                genericName:
                    type: string
                    nullable: true
                    example: "Paracetamol"
                    description: INN / generic name.
                drugClass:
                    type: string
                    nullable: true
                    example: "Analgesic / Antipyretic"
                    description: Pharmacological class.
                strength:
                    type: string
                    nullable: true
                    example: "500mg"
                    description: Dose strength per unit.
                form: { $ref: "#/components/schemas/DrugForm" }
                isActive:
                    type: boolean
                    example: true
                    description: Whether this drug is available for selection in prescriptions.

        CreateDrugRequest:
            type: object
            required: [brandName]
            description: Add a new drug to the master catalogue. Requires ADMIN or SUPER_ADMIN role.
            properties:
                brandName: { type: string, example: "Napa" }
                genericName: { type: string, example: "Paracetamol" }
                drugClass: { type: string, example: "Analgesic / Antipyretic" }
                strength: { type: string, example: "500mg" }
                form: { $ref: "#/components/schemas/DrugForm" }
                isActive: { type: boolean, default: true }

        # ── TEMPLATES ─────────────────────────────────────────────────────────────

        AdviceTemplateResponse:
            type: object
            description: A saved reusable advice snippet for quick insertion into prescriptions.
            properties:
                id: { type: string }
                doctorId: { type: string }
                templateName:
                    type: string
                    example: "Hypertension Lifestyle Advice"
                adviceText:
                    type: string
                    example: "Reduce salt intake, exercise 30 minutes daily, avoid smoking."
                isShared:
                    type: boolean
                    description: If true, visible to all doctors in the clinic.

        AdviceTemplateRequest:
            type: object
            required: [templateName, adviceText]
            properties:
                templateName: { type: string }
                adviceText: { type: string }
                isShared: { type: boolean, default: false }

        DrugTemplateResponse:
            type: object
            description: A named drug regimen template containing one or more drug items.
            properties:
                id: { type: string }
                doctorId: { type: string }
                templateName:
                    type: string
                    example: "Standard HTN Regimen"
                isShared: { type: boolean }
                items:
                    type: array
                    items:
                        {
                            $ref: "#/components/schemas/DrugTemplateItemResponse",
                        }

        DrugTemplateItemResponse:
            type: object
            description: A single drug entry within a drug template.
            properties:
                id: { type: string }
                templateId: { type: string }
                drugId: { type: string, nullable: true }
                customBrand: { type: string, nullable: true }
                dose: { type: string, nullable: true, example: "5mg" }
                instruction:
                    { type: string, nullable: true, example: "১ বার রাতে" }
                duration: { type: string, nullable: true, example: "৩০ দিন" }
                sortOrder: { type: integer }

        DrugTemplateRequest:
            type: object
            required: [templateName, items]
            properties:
                templateName: { type: string }
                isShared: { type: boolean, default: false }
                items:
                    type: array
                    minItems: 1
                    items:
                        type: object
                        required: [itemNo]
                        properties:
                            drugId: { type: string }
                            customBrand: { type: string }
                            dose: { type: string }
                            instruction: { type: string }
                            duration: { type: string }
                            sortOrder: { type: integer }

        PrescriptionTemplateResponse:
            type: object
            description: A full prescription preset including diagnoses, drugs, and advice.
            properties:
                id: { type: string }
                doctorId: { type: string }
                templateName: { type: string, example: "Type 2 DM Management" }
                isShared: { type: boolean }
                items:
                    type: array
                    items:
                        {
                            $ref: "#/components/schemas/PrescriptionTemplateItemResponse",
                        }

        PrescriptionTemplateItemResponse:
            type: object
            description: A single row within a prescription template (drug + diagnosis + advice combined).
            properties:
                id: { type: string }
                templateId: { type: string }
                drugId: { type: string, nullable: true }
                diagnosisText:
                    {
                        type: string,
                        nullable: true,
                        example: "Type 2 Diabetes Mellitus",
                    }
                adviceText: { type: string, nullable: true }
                customBrand: { type: string, nullable: true }
                dose: { type: string, nullable: true }
                instruction: { type: string, nullable: true }
                duration: { type: string, nullable: true }
                sortOrder: { type: integer }

        # ── REFERRAL AGENT ────────────────────────────────────────────────────────

        ReferralAgentResponse:
            type: object
            description: An agent (marketing officer, clinic manager, etc.) who refers patients to the clinic.
            properties:
                id: { type: string }
                name:
                    type: string
                    example: "Rafiq Ahmed"
                    description: Full name of the agent.
                phone:
                    type: string
                    nullable: true
                    example: "+8801811111111"
                email:
                    type: string
                    format: email
                    nullable: true
                organization:
                    type: string
                    nullable: true
                    example: "MediCare NGO"
                    description: Hospital, NGO, or company the agent represents.
                agentType: { $ref: "#/components/schemas/ReferralAgentType" }
                commissionType: { $ref: "#/components/schemas/CommissionType" }
                commissionValue:
                    type: number
                    nullable: true
                    example: 100.00
                    description: "Commission amount. For FLAT: BDT value. For PERCENTAGE: percent (e.g. 10 = 10%)."
                isActive: { type: boolean }
                notes: { type: string, nullable: true }

        CreateReferralAgentRequest:
            type: object
            required: [name, agentType]
            properties:
                name: { type: string }
                phone: { type: string }
                email: { type: string, format: email }
                organization: { type: string }
                agentType: { $ref: "#/components/schemas/ReferralAgentType" }
                commissionType: { $ref: "#/components/schemas/CommissionType" }
                commissionValue: { type: number }
                notes: { type: string }

        # ── REFERRAL ──────────────────────────────────────────────────────────────

        ReferralResponse:
            type: object
            description: Links a referral agent to an appointment with snapshotted commission data.
            properties:
                id: { type: string }
                agentId: { type: string }
                appointmentId: { type: string }
                commissionType: { $ref: "#/components/schemas/CommissionType" }
                commissionValue:
                    type: number
                    nullable: true
                    description: Snapshotted commission value at time of referral creation.
                commissionEarned:
                    type: number
                    nullable: true
                    example: 80.00
                    description: Final calculated commission amount in BDT.
                isPaid:
                    type: boolean
                    description: Whether the commission has been paid out to the agent.
                paidAt:
                    type: string
                    format: date-time
                    nullable: true
                notes: { type: string, nullable: true }
                createdAt: { type: string, format: date-time }

        CreateReferralRequest:
            type: object
            required: [agentId, appointmentId]
            description: Manually create a referral. Commission values are auto-snapshotted from the agent.
            properties:
                agentId: { type: string }
                appointmentId: { type: string }
                notes: { type: string }

        MarkReferralPaidRequest:
            type: object
            required: [isPaid]
            properties:
                isPaid: { type: boolean, example: true }
                paidAt:
                    type: string
                    format: date-time
                    description: Defaults to current timestamp if not provided.

        # ── SAAS PLAN ─────────────────────────────────────────────────────────────

        SaasPlanResponse:
            type: object
            description: A SaaS subscription plan available to clinic admins.
            properties:
                id: { type: string }
                name:
                    type: string
                    example: "Professional"
                    description: Human-readable plan name.
                tier: { $ref: "#/components/schemas/PlanTier" }
                monthlyPrice:
                    type: number
                    example: 2500.00
                    description: Monthly price in BDT.
                yearlyPrice:
                    type: number
                    example: 25000.00
                    description: Annual price in BDT (typically ~2 months free).
                maxDoctors:
                    type: integer
                    example: 10
                    description: Maximum number of doctor accounts allowed under this plan.
                maxPatients:
                    type: integer
                    example: 5000
                    description: Maximum active patients allowed.
                maxStorageGb:
                    type: integer
                    example: 20
                    description: Storage quota in GB for files and images.
                maxAppointments:
                    type: integer
                    example: -1
                    description: Max appointments per month. -1 means unlimited.
                features:
                    type: object
                    description: Feature flags for this plan.
                    example:
                        videoCall: true
                        audioCall: true
                        homeVisit: false
                        reportReview: true
                        customBranding: true
                        apiAccess: false
                isActive: { type: boolean }

        CreateSaasPlanRequest:
            type: object
            required: [name, tier, monthlyPrice, yearlyPrice, features]
            description: Create a new SaaS plan. Requires SUPER_ADMIN role.
            properties:
                name: { type: string }
                tier: { $ref: "#/components/schemas/PlanTier" }
                monthlyPrice: { type: number }
                yearlyPrice: { type: number }
                maxDoctors: { type: integer, default: 1 }
                maxPatients: { type: integer, default: 500 }
                maxStorageGb: { type: integer, default: 5 }
                maxAppointments: { type: integer, default: 200 }
                features: { type: object }

        # ── SUBSCRIPTION ──────────────────────────────────────────────────────────

        SubscriptionResponse:
            type: object
            description: A clinic admin's active SaaS subscription.
            properties:
                id: { type: string }
                userId: { type: string, description: "FK to User (ADMIN)." }
                planId: { type: string }
                plan: { $ref: "#/components/schemas/SaasPlanResponse" }
                status: { $ref: "#/components/schemas/SubscriptionStatus" }
                billingCycle: { $ref: "#/components/schemas/BillingCycle" }
                trialEndsAt:
                    type: string
                    format: date-time
                    nullable: true
                    description: Trial expiry timestamp. Null if not on trial.
                startDate:
                    type: string
                    format: date-time
                    description: Subscription start date.
                endDate:
                    type: string
                    format: date-time
                    description: Next renewal or expiry date.
                autoRenew: { type: boolean }
                lastPaidAt:
                    type: string
                    format: date-time
                    nullable: true
                nextBillingAt:
                    type: string
                    format: date-time
                    nullable: true
                cancelledAt:
                    type: string
                    format: date-time
                    nullable: true
                cancellationNote:
                    type: string
                    nullable: true

        CreateSubscriptionRequest:
            type: object
            required: [planId, billingCycle]
            description: Subscribe a clinic admin to a SaaS plan.
            properties:
                planId: { type: string }
                billingCycle: { $ref: "#/components/schemas/BillingCycle" }
                autoRenew: { type: boolean, default: true }

        CancelSubscriptionRequest:
            type: object
            properties:
                cancellationNote:
                    type: string
                    example: "Switching to a different plan"
                    description: Optional reason for cancellation.

        # ── INVOICE ───────────────────────────────────────────────────────────────

        InvoiceResponse:
            type: object
            description: A billing invoice for one subscription cycle.
            properties:
                id: { type: string }
                subscriptionId: { type: string }
                amount:
                    type: number
                    example: 2500.00
                    description: Invoice amount in BDT.
                currency:
                    type: string
                    example: "BDT"
                status: { $ref: "#/components/schemas/PaymentStatus" }
                billingCycle: { $ref: "#/components/schemas/BillingCycle" }
                periodStart:
                    type: string
                    format: date-time
                    description: Start of the billing period this invoice covers.
                periodEnd:
                    type: string
                    format: date-time
                    description: End of the billing period this invoice covers.
                method:
                    $ref: "#/components/schemas/PaymentMethod"
                    nullable: true
                transactionId:
                    type: string
                    nullable: true
                receiptNo:
                    type: string
                    nullable: true
                issuedAt: { type: string, format: date-time }
                paidAt:
                    type: string
                    format: date-time
                    nullable: true
                dueDate:
                    type: string
                    format: date-time
                    nullable: true

        # ── AUDIT LOG ─────────────────────────────────────────────────────────────

        AuditLogResponse:
            type: object
            description: An immutable audit trail entry recording a state-changing action.
            properties:
                id: { type: string }
                userId:
                    type: string
                    description: The user who performed the action.
                action:
                    type: string
                    example: "UPDATE"
                    description: "Action type: CREATE | UPDATE | DELETE | LOGIN | PRINT"
                tableName:
                    type: string
                    example: "Prescription"
                    description: The database table/model that was affected.
                recordId:
                    type: string
                    nullable: true
                    example: "clx1abc123"
                    description: ID of the affected record.
                changes:
                    type: object
                    nullable: true
                    description: JSON diff of before/after values for UPDATE actions.
                    example:
                        {
                            before: { status: "DRAFT" },
                            after: { status: "FINALIZED" },
                        }
                createdAt: { type: string, format: date-time }

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────

security:
    - BearerAuth: []

paths:
    # ════════════════════════════════════════════════════════════════
    # AUTH
    # ════════════════════════════════════════════════════════════════

    /auth/register:
        post:
            tags: [Auth]
            summary: Register a new user
            description: Creates a new user account and sends an email OTP for verification. Account status is PENDING until email is verified.
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema: { $ref: "#/components/schemas/RegisterRequest" }
            responses:
                "201":
                    description: User registered. Verification email sent.
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/SuccessResponse" }
                "409": { $ref: "#/components/responses/ConflictError" }
                "422": { $ref: "#/components/responses/ValidationError" }

    /auth/verify-email:
        post:
            tags: [Auth]
            summary: Verify email with OTP
            description: Activates the account by consuming the 6-digit OTP sent on registration.
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            { $ref: "#/components/schemas/VerifyEmailRequest" }
            responses:
                "200":
                    description: Email verified. Account is now ACTIVE.
                "400":
                    description: Invalid or expired OTP.

    /auth/login:
        post:
            tags: [Auth]
            summary: Login and obtain JWT tokens
            description: Authenticates the user and returns an access token (15 min) and refresh token (7 days).
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema: { $ref: "#/components/schemas/LoginRequest" }
            responses:
                "200":
                    description: Login successful.
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/AuthTokenResponse",
                                }
                "401":
                    description: Invalid credentials.
                "403":
                    description: Account suspended or not verified.

    /auth/refresh:
        post:
            tags: [Auth]
            summary: Refresh access token
            description: Exchanges a valid refresh token for a new access token + refresh token pair (rotation).
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema: { $ref: "#/components/schemas/RefreshRequest" }
            responses:
                "200":
                    description: New token pair issued.
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/AuthTokenResponse",
                                }
                "401":
                    description: Refresh token invalid or expired.

    /auth/logout:
        post:
            tags: [Auth]
            summary: Logout (revoke refresh token)
            description: Deletes the refresh token from the database, invalidating the session.
            responses:
                "200":
                    description: Logged out successfully.
                "401": { $ref: "#/components/responses/UnauthorizedError" }

    /auth/forgot-password:
        post:
            tags: [Auth]
            summary: Request password reset OTP
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/ForgotPasswordRequest",
                            }
            responses:
                "200":
                    description: OTP sent to email if account exists.

    /auth/reset-password:
        post:
            tags: [Auth]
            summary: Reset password using OTP
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/ResetPasswordRequest",
                            }
            responses:
                "200":
                    description: Password reset successful.
                "400":
                    description: OTP invalid or expired.

    /auth/change-password:
        post:
            tags: [Auth]
            summary: Change password (authenticated)
            description: Requires the current password as confirmation before updating.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/ChangePasswordRequest",
                            }
            responses:
                "200": { description: Password changed. }
                "401": { $ref: "#/components/responses/UnauthorizedError" }
                "400": { description: Current password incorrect. }

    /auth/me:
        get:
            tags: [Auth]
            summary: Get current authenticated user
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/UserResponse" }
                "401": { $ref: "#/components/responses/UnauthorizedError" }

    # ════════════════════════════════════════════════════════════════
    # USERS
    # ════════════════════════════════════════════════════════════════

    /users:
        get:
            tags: [Users]
            summary: List all users
            description: Returns paginated list of users. Requires ADMIN or SUPER_ADMIN.
            parameters:
                - $ref: "#/components/parameters/PageParam"
                - $ref: "#/components/parameters/LimitParam"
                - name: role
                  in: query
                  schema: { $ref: "#/components/schemas/Role" }
                - name: status
                  in: query
                  schema: { $ref: "#/components/schemas/AccountStatus" }
                - name: search
                  in: query
                  schema: { type: string }
                  description: Search by name, email, or phone.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PaginatedResponse",
                                }
                "401": { $ref: "#/components/responses/UnauthorizedError" }
                "403": { $ref: "#/components/responses/ForbiddenError" }

    /users/{id}:
        get:
            tags: [Users]
            summary: Get user by ID
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/UserResponse" }
                "404": { $ref: "#/components/responses/NotFoundError" }
        patch:
            tags: [Users]
            summary: Update user name or phone
            parameters:
                - $ref: "#/components/parameters/IdParam"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            { $ref: "#/components/schemas/UpdateUserRequest" }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/UserResponse" }
        delete:
            tags: [Users]
            summary: Deactivate / delete user
            description: Soft-deletes by setting status to INACTIVE. Hard delete requires SUPER_ADMIN.
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200": { description: User deactivated. }
                "404": { $ref: "#/components/responses/NotFoundError" }

    /users/{id}/status:
        patch:
            tags: [Users]
            summary: Change account status (Admin)
            description: Allows admins to SUSPEND or re-ACTIVATE a user account.
            parameters:
                - $ref: "#/components/parameters/IdParam"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [status]
                            properties:
                                status:
                                    {
                                        $ref: "#/components/schemas/AccountStatus",
                                    }
            responses:
                "200": { description: Status updated. }

    # ════════════════════════════════════════════════════════════════
    # PATIENT PROFILE
    # ════════════════════════════════════════════════════════════════

    /patients/{userId}/profile:
        get:
            tags: [Patient Profile]
            summary: Get patient profile
            parameters:
                - name: userId
                  in: path
                  required: true
                  schema: { type: string }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PatientProfileResponse",
                                }
                "404": { $ref: "#/components/responses/NotFoundError" }
        put:
            tags: [Patient Profile]
            summary: Create or update patient profile
            parameters:
                - name: userId
                  in: path
                  required: true
                  schema: { type: string }
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/UpsertPatientProfileRequest",
                            }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PatientProfileResponse",
                                }

    # ════════════════════════════════════════════════════════════════
    # DOCTOR PROFILE
    # ════════════════════════════════════════════════════════════════

    /doctors/{userId}/profile:
        get:
            tags: [Doctor Profile]
            summary: Get doctor profile
            parameters:
                - name: userId
                  in: path
                  required: true
                  schema: { type: string }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/DoctorProfileResponse",
                                }
        put:
            tags: [Doctor Profile]
            summary: Create or update doctor profile
            parameters:
                - name: userId
                  in: path
                  required: true
                  schema: { type: string }
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/UpsertDoctorProfileRequest",
                            }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/DoctorProfileResponse",
                                }

    # ════════════════════════════════════════════════════════════════
    # DOCTOR SERVICES
    # ════════════════════════════════════════════════════════════════

    /doctors/{doctorId}/services:
        get:
            tags: [Doctor Services]
            summary: List services offered by a doctor
            parameters:
                - name: doctorId
                  in: path
                  required: true
                  schema: { type: string }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    {
                                        $ref: "#/components/schemas/DoctorServiceResponse",
                                    }
        post:
            tags: [Doctor Services]
            summary: Add a new service for the doctor
            description: A doctor can have at most one configuration per ServiceType.
            parameters:
                - name: doctorId
                  in: path
                  required: true
                  schema: { type: string }
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/CreateDoctorServiceRequest",
                            }
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/DoctorServiceResponse",
                                }
                "409": { $ref: "#/components/responses/ConflictError" }

    /doctors/{doctorId}/services/{serviceId}:
        patch:
            tags: [Doctor Services]
            summary: Update a doctor service
            parameters:
                - name: doctorId
                  in: path
                  required: true
                  schema: { type: string }
                - name: serviceId
                  in: path
                  required: true
                  schema: { type: string }
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/UpdateDoctorServiceRequest",
                            }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/DoctorServiceResponse",
                                }
        delete:
            tags: [Doctor Services]
            summary: Remove a doctor service
            parameters:
                - name: doctorId
                  in: path
                  required: true
                  schema: { type: string }
                - name: serviceId
                  in: path
                  required: true
                  schema: { type: string }
            responses:
                "200": { description: Service removed. }

    # ════════════════════════════════════════════════════════════════
    # APPOINTMENTS
    # ════════════════════════════════════════════════════════════════

    /appointments:
        get:
            tags: [Appointments]
            summary: List appointments
            description: Returns appointments filtered by role. Doctors see their own; patients see theirs; admins see all.
            parameters:
                - $ref: "#/components/parameters/PageParam"
                - $ref: "#/components/parameters/LimitParam"
                - name: doctorId
                  in: query
                  schema: { type: string }
                - name: patientId
                  in: query
                  schema: { type: string }
                - name: status
                  in: query
                  schema: { $ref: "#/components/schemas/AppointmentStatus" }
                - name: serviceType
                  in: query
                  schema: { $ref: "#/components/schemas/ServiceType" }
                - name: date
                  in: query
                  schema: { type: string, format: date }
                  description: Filter appointments for a specific date (YYYY-MM-DD).
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PaginatedResponse",
                                }
        post:
            tags: [Appointments]
            summary: Book a new appointment
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/CreateAppointmentRequest",
                            }
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/AppointmentResponse",
                                }
                "422": { $ref: "#/components/responses/ValidationError" }

    /appointments/{id}:
        get:
            tags: [Appointments]
            summary: Get appointment by ID
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/AppointmentResponse",
                                }
                "404": { $ref: "#/components/responses/NotFoundError" }
        patch:
            tags: [Appointments]
            summary: Update appointment
            parameters:
                - $ref: "#/components/parameters/IdParam"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/UpdateAppointmentRequest",
                            }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/AppointmentResponse",
                                }
        delete:
            tags: [Appointments]
            summary: Cancel appointment
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200": { description: Appointment cancelled. }

    /appointments/{id}/call/start:
        post:
            tags: [Appointments]
            summary: Start video/audio call session
            description: Generates a call room ID and sets callStartedAt. Only valid for VIDEO_CALL or AUDIO_CALL appointments.
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    callRoomId: { type: string }
                                    callStartedAt:
                                        { type: string, format: date-time }

    /appointments/{id}/call/end:
        post:
            tags: [Appointments]
            summary: End video/audio call session
            description: Sets callEndedAt and calculates callDurationMin.
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/AppointmentResponse",
                                }

    # ════════════════════════════════════════════════════════════════
    # PAYMENTS
    # ════════════════════════════════════════════════════════════════

    /payments:
        get:
            tags: [Payments]
            summary: List payments
            parameters:
                - $ref: "#/components/parameters/PageParam"
                - $ref: "#/components/parameters/LimitParam"
                - name: appointmentId
                  in: query
                  schema: { type: string }
                - name: patientId
                  in: query
                  schema: { type: string }
                - name: status
                  in: query
                  schema: { $ref: "#/components/schemas/PaymentStatus" }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PaginatedResponse",
                                }
        post:
            tags: [Payments]
            summary: Record a new payment
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/CreatePaymentRequest",
                            }
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/PaymentResponse" }

    /payments/{id}:
        get:
            tags: [Payments]
            summary: Get payment by ID
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/PaymentResponse" }
        patch:
            tags: [Payments]
            summary: Update payment status
            parameters:
                - $ref: "#/components/parameters/IdParam"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                status:
                                    {
                                        $ref: "#/components/schemas/PaymentStatus",
                                    }
                                transactionId: { type: string }
                                paidAt: { type: string, format: date-time }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                { $ref: "#/components/schemas/PaymentResponse" }

    # ════════════════════════════════════════════════════════════════
    # PRESCRIPTIONS
    # ════════════════════════════════════════════════════════════════

    /prescriptions:
        post:
            tags: [Prescriptions]
            summary: Create a new prescription
            description: Initialises a DRAFT prescription for a completed appointment. One per appointment.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/CreatePrescriptionRequest",
                            }
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PrescriptionResponse",
                                }
                "409": { $ref: "#/components/responses/ConflictError" }

    /prescriptions/{id}:
        get:
            tags: [Prescriptions]
            summary: Get prescription by ID (with all sections)
            description: Returns the full prescription including all clinical sub-sections.
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PrescriptionResponse",
                                }
                "404": { $ref: "#/components/responses/NotFoundError" }
        patch:
            tags: [Prescriptions]
            summary: Update prescription metadata or promote status
            parameters:
                - $ref: "#/components/parameters/IdParam"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/UpdatePrescriptionRequest",
                            }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PrescriptionResponse",
                                }

    /prescriptions/{id}/print:
        post:
            tags: [Prescriptions]
            summary: Mark prescription as PRINTED and return print-ready data
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200":
                    description: Prescription finalized and marked as PRINTED.

    # ── Chief Complaints ──────────────────────────────────────────

    /prescriptions/{prescriptionId}/chief-complaints:
        get:
            tags: [Chief Complaints]
            summary: List chief complaints for a prescription
            parameters:
                - name: prescriptionId
                  in: path
                  required: true
                  schema: { type: string }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    {
                                        $ref: "#/components/schemas/ChiefComplaintResponse",
                                    }
        post:
            tags: [Chief Complaints]
            summary: Add a chief complaint
            parameters:
                - name: prescriptionId
                  in: path
                  required: true
                  schema: { type: string }
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/ChiefComplaintRequest",
                            }
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/ChiefComplaintResponse",
                                }

    /prescriptions/{prescriptionId}/chief-complaints/{id}:
        patch:
            tags: [Chief Complaints]
            summary: Update a chief complaint
            parameters:
                - name: prescriptionId
                  in: path
                  required: true
                  schema: { type: string }
                - $ref: "#/components/parameters/IdParam"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/ChiefComplaintRequest",
                            }
            responses:
                "200":
