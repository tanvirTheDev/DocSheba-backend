                                    items:
                                        {
                                            $ref: "#/components/schemas/PrescriptionTemplateItemResponse",
                                        }
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PrescriptionTemplateResponse",
                                }

    /templates/prescriptions/{id}:
        patch:
            tags: [Templates]
            summary: Update prescription template
            parameters:
                - $ref: "#/components/parameters/IdParam"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                templateName: { type: string }
                                isShared: { type: boolean }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PrescriptionTemplateResponse",
                                }
        delete:
            tags: [Templates]
            summary: Delete prescription template
            parameters:
                - $ref: "#/components/parameters/IdParam"
            responses:
                "200": { description: Deleted. }

