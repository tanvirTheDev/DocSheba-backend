                - $ref: "#/components/parameters/LimitParam"
                - name: agentId
                  in: query
                  schema: { type: string }
                - name: isPaid
                  in: query
                  schema: { type: boolean }
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                {
                                    $ref: "#/components/schemas/PaginatedResponse",
                                }
        post:
            tags: [Referrals]
            summary: Create a referral manually
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            {
                                $ref: "#/components/schemas/CreateReferralRequest",
                            }
            responses:
